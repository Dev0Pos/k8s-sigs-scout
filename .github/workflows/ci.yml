name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /tmp/k8s-scout .

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t k8s-scout .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: k8s-scout
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "1"
          scanners: vuln
          format: table
