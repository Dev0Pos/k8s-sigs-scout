<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>k8s-sigs-scout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            k8s: '#326ce5',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-zinc-950 text-zinc-100 antialiased">
  <div class="flex min-h-full flex-col">
    <header class="border-b border-zinc-800 bg-zinc-900/80 backdrop-blur">
      <div class="mx-auto max-w-5xl px-4 py-6">
        <div class="flex items-baseline gap-3">
          <h1 class="text-2xl font-semibold tracking-tight">
            <span class="text-k8s">k8s-sigs</span>-scout
          </h1>
          <span class="text-sm text-zinc-500">unassigned good first issues</span>
        </div>
        <p class="mt-2 text-sm text-zinc-400">
          Filters run against an in-memory cache (GitHub API refresh every 15&nbsp;min).
          {{ if .UpdatedAt }}Last refresh: <span class="text-zinc-300">{{ .UpdatedAt }}</span>{{ end }}
        </p>
      </div>
    </header>

    <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-8">
      <form
        class="flex flex-col gap-3 sm:flex-row sm:items-end"
        hx-get="/"
        hx-target="#results"
        hx-push-url="true"
        hx-trigger="keyup changed delay:200ms from:input, change from:select"
      >
        <label class="flex-1">
          <span class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-zinc-500">Search</span>
          <input
            type="search"
            name="q"
            value="{{ .Query }}"
            placeholder="Filter by title, repo, or label…"
            autocomplete="off"
            class="w-full rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2.5 text-sm text-zinc-100 placeholder:text-zinc-600 focus:border-k8s focus:outline-none focus:ring-1 focus:ring-k8s"
          />
        </label>
        <label class="sm:w-48">
          <span class="mb-1.5 block text-xs font-medium uppercase tracking-wide text-zinc-500">Language / tag</span>
          <select
            name="lang"
            class="w-full rounded-lg border border-zinc-700 bg-zinc-900 px-3 py-2.5 text-sm text-zinc-100 focus:border-k8s focus:outline-none focus:ring-1 focus:ring-k8s"
          >
            <option value="">All</option>
            <option value="go" {{ if eq .Lang "go" }}selected{{ end }}>Go</option>
            <option value="python" {{ if eq .Lang "python" }}selected{{ end }}>Python</option>
            <option value="javascript" {{ if eq .Lang "javascript" }}selected{{ end }}>JavaScript</option>
            <option value="typescript" {{ if eq .Lang "typescript" }}selected{{ end }}>TypeScript</option>
            <option value="rust" {{ if eq .Lang "rust" }}selected{{ end }}>Rust</option>
            <option value="java" {{ if eq .Lang "java" }}selected{{ end }}>Java</option>
            <option value="docs" {{ if eq .Lang "docs" }}selected{{ end }}>Docs</option>
            <option value="helm" {{ if eq .Lang "helm" }}selected{{ end }}>Helm</option>
            <option value="yaml" {{ if eq .Lang "yaml" }}selected{{ end }}>YAML</option>
          </select>
        </label>
      </form>

      <div id="results" class="mt-8">
        {{ template "results.html" . }}
      </div>
    </main>

    <footer class="border-t border-zinc-800/80">
      <div class="mx-auto flex max-w-5xl items-center justify-between gap-3 px-4 py-4 text-xs text-zinc-500">
        <span>Built by
          <a
            href="https://github.com/Dev0Pos"
            target="_blank"
            rel="noopener noreferrer"
            class="text-zinc-400 hover:text-k8s"
          >Dev0Pos</a>
        </span>
        <a
          href="https://github.com/Dev0Pos/k8s-sigs-scout"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-1.5 text-zinc-500 hover:text-k8s"
          aria-label="Source on GitHub"
        >
          <svg class="h-3.5 w-3.5" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Source
        </a>
      </div>
    </footer>
  </div>
</body>
</html>
